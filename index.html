<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Mi Negocio</title>
    <style>
        :root {
            --bg: #0f0f14; --bg2: #16161e; --sidebar-bg: #0a0a10; --side-card: #1a1a26;
            --border-def: #323246; --accent-purp: #8b5cf6; --accent-ind: #4f46e5;
            --text-pri: #ebebf5; --text-mut: #787891; --btn-bg: #20202d; --btn-fg: #bebed2;
            --btn-bor: #373750; --sel-pl-bg: #2563eb; --sel-gs-bg: #6d28d9;
            --sel-ex-bg: #0e7490; --sel-bb-bg: #581c87;
        }

        /* 1. ELIMINAR SCROLL GLOBAL */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-pri); 
            display: flex; 
            height: 100dvh; /* Ocupa exactamente el alto de la pantalla */
            overflow: hidden; /* Evita que la página entera se mueva */
        }

        /* 2. SCROLL IZQUIERDO (MENU) */
        .main-content { 
            flex: 1.6; /* Más ancho para el menú */
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; /* SCROLL 1 */
            padding: 20px;
            border-right: 1px solid var(--border-def);
        }

        /* 3. SCROLL DERECHO (CARRITO) */
        .sidebar { 
            flex: 1; 
            background-color: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            height: 100%; /* No se sale de la pantalla */
        }

        /* Ajuste para móviles y iPads verticales */
        @media (max-width: 1000px) {
            body { flex-direction: column; }
            .main-content { flex: 1; border-right: none; border-bottom: 2px solid var(--border-def); }
            .sidebar { flex: 0.8; }
        }

        .section { margin-bottom: 20px; }
        .section-title { font-size: 14px; font-weight: bold; color: #a0a0be; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ""; display: inline-block; width: 4px; height: 16px; background-color: var(--accent-purp); }
        .hint { font-size: 12px; color: var(--text-mut); margin-bottom: 10px; }
        
        .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn { background: var(--btn-bg); color: var(--btn-fg); border: 1px solid var(--btn-bor); padding: 12px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        
        .btn.active-pl { background: var(--sel-pl-bg); color: white; border-color: #60a5fa; }
        .btn.active-gs { background: var(--sel-gs-bg); color: white; border-color: #a78bfa; }
        .btn.active-ex { background: var(--sel-ex-bg); color: white; border-color: #22d3ee; }
        .btn.active-bb { background: var(--sel-bb-bg); color: white; border-color: #c084fc; }
        hr { border: none; border-top: 1px solid var(--border-def); margin: 20px 0; }

        /* BARRA INFERIOR DEL MENU (Siempre visible al final del scroll 1) */
        .bottom-bar { 
            background: #0c0c12; 
            border: 1px solid var(--border-def);
            padding: 15px; 
            display: flex; 
            gap: 10px;
            margin-top: auto; 
            position: sticky;
            bottom: 0;
            border-radius: 8px;
        }
        .price-box { background: #14142a; padding: 8px 15px; border-radius: 6px; flex: 1; border: 1px solid var(--accent-ind); }
        .price-value { font-size: 22px; font-weight: bold; color: #a78bfa; }
        .btn-add { background: var(--accent-ind); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; flex: 1.2; }

        /* CUERPO DEL PEDIDO (Scroll 2) */
        .sb-header { padding: 15px; background: #08080e; border-bottom: 1px solid var(--border-def); }
        .sb-body { 
            padding: 15px; 
            flex: 1; 
            overflow-y: auto; /* SCROLL 2 */
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        .cart-item { background: var(--side-card); border: 1px solid #373750; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .cart-item-title { font-size: 14px; font-weight: bold; }
        .cart-item-desc { font-size: 11px; color: var(--text-mut); margin-top: 4px; }
        .cart-item-price { color: #818cf8; font-weight: bold; }
        .btn-del { background: #2d1a1a; color: #f87171; border: 1px solid #452222; padding: 5px 8px; border-radius: 4px; cursor: pointer; }

        .sb-footer { padding: 15px; background: #08080e; border-top: 1px solid var(--border-def); }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .total-val { font-size: 26px; font-weight: bold; color: #a78bfa; }
        .btn-action { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        
        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--bg2); width: 600px; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; max-height: 90vh; }
        .historial-area { background: var(--bg); padding: 15px; border-radius: 6px; overflow-y: auto; flex: 1; font-family: monospace; font-size: 13px; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="section"><div class="section-title">1. PLATILLO</div><div class="btn-grid" id="grid-platillos"></div></div><hr>
        <div class="section">
            <div class="section-title">2. GUISADO</div>
            <div class="hint" id="hint-text">Sencillo (1 guisado) = $22 · Guisado extra = +$5 · Bistec+quesillo=$37 · Campechano=$42</div>
            <div class="btn-grid" id="grid-guisados"></div>
        </div><hr>
        <div class="section"><div class="section-title">3. SALSA</div><div class="btn-grid" id="grid-salsas"></div></div><hr>
        <div class="section">
            <div class="section-title" style="justify-content: space-between;">
                <span>4. EXTRAS</span>
                <button class="btn" style="padding:4px 8px; font-size:11px;" onclick="agregarTodosExtras()">+ Todo</button>
            </div>
            <div class="btn-grid" id="grid-extras"></div>
        </div><hr>
        <div class="section"><div class="section-title">5. BEBIDA</div><div class="btn-grid" id="grid-bebidas"></div></div>
        
        <div class="bottom-bar">
            <div class="price-box"><div class="price-value" id="lbl-precio">—</div></div>
            <button class="btn-add" onclick="agregarItem()">+ AGREGAR</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sb-header"><h3>Pedido actual</h3><div id="lbl-side-count" style="font-size:12px; color:var(--text-mut)">0 productos</div></div>
        <div class="sb-body" id="sidebar-resumen"></div>
        <div class="sb-footer">
            <div class="total-row"><span>Total</span><span class="total-val" id="lbl-side-total">$0.00</span></div>
            <button class="btn-action" style="background:#2563eb; color:white;" onclick="guardarVenta()">GUARDAR VENTA ></button>
            <button class="btn-action" style="background:#28283a; color:white;" onclick="limpiarPedido()">Limpiar</button>
            <button class="btn-action" style="background:#059669; color:white;" onclick="abrirModalCorte()">Ver Corte 📊</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-corte">
        <div class="modal">
            <div style="display:flex; justify-content:space-between"><h2>Historial</h2><button onclick="cerrarModalCorte()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer">✖</button></div>
            <div id="lbl-metricas" style="margin-top:10px; color:#a78bfa"></div>
            <div class="historial-area" id="area-historial"></div>
            <button class="btn-action" style="background:#059669; color:white" onclick="hacerCorte()">CERRAR DÍA</button>
        </div>
    </div>

    <script>
        const PLATILLOS = ["Tostada", "Sope", "Pambazo", "Gordita", "Quesadilla", "Taco", "Huarache"];
        const GUISADOS  = ["Chicharron", "Tinga de pollo", "Requesón", "Pancita", "Picadillo", "Pata", "Huitlacoche", "Flor de calabaza", "Champiñones", "Tinga de carne", "Quesillo", "Bistec + quesillo", "Campechano"];
        const SALSAS    = ["Salsa verde", "Salsa roja"];
        const EXTRAS    = ["Queso rayado", "Cilantro", "Cebolla", "Crema", "Nopales", "Lechuga", "Frijoles"];
        const BEBIDAS   = ["Refresco  $27", "Jugo  $25"];

        let state = { selPlatillo: null, selGuisados: [], selSalsas: [], selExtras: [], selBebida: null, precBebida: 0, itemsVenta: [], numVenta: 0, historial: [] };

        function calcularPrecio(pl, gs) {
            const esH = pl === "Huarache"; const esT = pl === "Taco";
            const camp = gs.includes("Campechano"); const bist = gs.includes("Bistec + quesillo");
            if (esH) return camp ? 82 : bist ? 72 : 65 + (gs.length * 5);
            if (esT) return camp ? 47 : bist ? 42 : 22;
            if (camp) return 42; if (bist) return 37;
            return (gs.length <= 1) ? 22 : 22 + ((gs.length - 1) * 5);
        }

        function onPlatillo(p) { state.selPlatillo = (state.selPlatillo === p) ? null : p; state.selGuisados = []; actualizarUI(); }

        function onGuisado(g) {
            if (!state.selPlatillo) return;
            const esE = (g === "Campechano" || g === "Bistec + quesillo");
            if (state.selGuisados.includes(g)) state.selGuisados = state.selGuisados.filter(x => x !== g);
            else {
                if (esE) state.selGuisados = [g];
                else {
                    let limit = (state.selPlatillo === "Huarache") ? 99 : (state.selPlatillo === "Taco" ? 1 : 2);
                    if (state.selGuisados.length < limit) state.selGuisados.push(g);
                }
            }
            actualizarUI();
        }

        function renderGrid(id, items, check, click, cls) {
            const c = document.getElementById(id); c.innerHTML = '';
            items.forEach(it => {
                if (it === "Frijoles" && state.selPlatillo !== "Tostada") return;
                const b = document.createElement('button'); b.className = `btn ${check(it) ? cls : ''}`;
                b.innerText = it; b.onclick = () => click(it); c.appendChild(b);
            });
        }

        function actualizarUI() {
            renderGrid('grid-platillos', PLATILLOS, i => state.selPlatillo === i, onPlatillo, 'active-pl');
            renderGrid('grid-guisados', GUISADOS, i => state.selGuisados.includes(i), onGuisado, 'active-gs');
            renderGrid('grid-salsas', SALSAS, i => state.selSalsas.includes(i), s => {
                if (state.selSalsas.includes(s)) state.selSalsas = []; else state.selSalsas = [s]; actualizarUI();
            }, 'active-gs');
            renderGrid('grid-extras', EXTRAS, i => state.selExtras.includes(i), e => {
                if (state.selExtras.includes(e)) state.selExtras = state.selExtras.filter(x => x !== e); else state.selExtras.push(e); actualizarUI();
            }, 'active-ex');
            renderGrid('grid-bebidas', BEBIDAS, i => state.selBebida === i, b => {
                if (state.selBebida === b) { state.selBebida = null; state.precBebida = 0; }
                else { state.selBebida = b; state.precBebida = b.includes("27") ? 27 : 25; } actualizarUI();
            }, 'active-bb');

            const h = document.getElementById('hint-text');
            if (state.selPlatillo === "Huarache") h.innerText = "Base $65 + $5 c/guisado";
            else if (state.selPlatillo === "Taco") h.innerText = "Sencillo (1 guisado) = $22";
            else h.innerText = "Sencillo $22 · Guisado extra +$5";

            const lbl = document.getElementById('lbl-precio');
            if (!state.selPlatillo && !state.selBebida) lbl.innerText = "—";
            else lbl.innerText = `$${((state.selPlatillo ? calcularPrecio(state.selPlatillo, state.selGuisados) : 0) + state.precBebida).toFixed(2)}`;
        }

        function agregarItem() {
            if (!state.selPlatillo && !state.selBebida) return;
            let p = state.selPlatillo ? calcularPrecio(state.selPlatillo, state.selGuisados) : 0;
            state.itemsVenta.push({ nombre: state.selPlatillo || "Bebida", desc: state.selGuisados.join("+") || state.selBebida, precio: p + state.precBebida });
            state.selPlatillo = null; state.selGuisados = []; state.selSalsas = []; state.selExtras = []; state.selBebida = null; state.precBebida = 0;
            actualizarUI(); renderSidebar();
        }

        function renderSidebar() {
            const c = document.getElementById('sidebar-resumen'); c.innerHTML = ''; let t = 0;
            state.itemsVenta.forEach((it, idx) => {
                t += it.precio;
                const d = document.createElement('div'); d.className = 'cart-item';
                d.innerHTML = `<div><b>${it.nombre}</b><br><small>${it.desc}</small></div>
                               <div style="text-align:right"><b>$${it.precio}</b><br><button class="btn-del" onclick="state.itemsVenta.splice(${idx},1);renderSidebar()">✖</button></div>`;
                c.appendChild(d);
            });
            document.getElementById('lbl-side-total').innerText = `$${t.toFixed(2)}`;
            document.getElementById('lbl-side-count').innerText = state.itemsVenta.length + " productos";
            c.scrollTop = c.scrollHeight;
        }

        function guardarVenta() {
            if (!state.itemsVenta.length) return;
            state.numVenta++;
            let total = state.itemsVenta.reduce((a, b) => a + b.precio, 0);
            state.historial.push({ texto: `Venta #${state.numVenta}: $${total}\n` + state.itemsVenta.map(i => ` - ${i.nombre}: $${i.precio}`).join("\n"), total });
            state.itemsVenta = []; renderSidebar(); alert("Venta Guardada");
        }

        function abrirModalCorte() {
            document.getElementById('modal-corte').style.display = 'flex';
            let t = state.historial.reduce((a, b) => a + b.total, 0);
            document.getElementById('lbl-metricas').innerText = `Total del día: $${t.toFixed(2)}`;
            document.getElementById('area-historial').innerText = state.historial.map(h => h.texto).join("\n\n");
        }
        function cerrarModalCorte() { document.getElementById('modal-corte').style.display = 'none'; }
        function hacerCorte() { if (confirm("¿Limpiar todo?")) { state.historial = []; state.numVenta = 0; cerrarModalCorte(); } }
        function agregarTodosExtras() { EXTRAS.forEach(e => { if (e === "Frijoles" && state.selPlatillo !== "Tostada") return; if (!state.selExtras.includes(e)) state.selExtras.push(e); }); actualizarUI(); }

        actualizarUI();
    </script>
</body>
</html>
